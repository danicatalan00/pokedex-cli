name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -m 'not install and not stress' --cov --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -m 'install or stress'

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m ruff check .
      - run: python -m ruff format --check .
      - name: Strict type-check extracted layers
        run: |
          targets=()
          [[ -d pokedex_cli/domain ]] && targets+=(pokedex_cli/domain)
          [[ -d pokedex_cli/application ]] && targets+=(pokedex_cli/application)
          if (( ${#targets[@]} )); then python -m mypy "${targets[@]}"; fi

  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m mutmut run
      - name: Enforce mutation baseline
        run: |
          python -m mutmut results | tee mutmut-results.txt
          ! grep -q 'no tests$' mutmut-results.txt
          test "$(grep -c 'survived$' mutmut-results.txt || true)" -le 40
